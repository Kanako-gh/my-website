<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K | 趣味：読書</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: #f5efe6;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 60px 50px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .icon {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c9a87c, #e8d5b0);
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    .title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #222;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      letter-spacing: 0.15em;
      color: #aaa;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #c9a87c;
      margin: 0 auto 36px;
      border-radius: 2px;
    }

    .info-list {
      list-style: none;
      text-align: left;
      margin-bottom: 40px;
    }

    .info-list li {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid #f0ebe4;
      font-size: 15px;
    }

    .info-list li:last-child {
      border-bottom: none;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #c9a87c;
      text-transform: uppercase;
      font-weight: 600;
      min-width: 72px;
    }

    .value {
      color: #444;
      font-size: 15px;
    }

    .message {
      background: #f8f5f0;
      border-radius: 12px;
      padding: 20px 24px;
      font-size: 14px;
      color: #666;
      line-height: 1.8;
      font-style: italic;
    }

    .message::before {
      content: '"';
      font-size: 28px;
      color: #c9a87c;
      line-height: 0;
      vertical-align: -10px;
      margin-right: 4px;
    }

    .message::after {
      content: '"';
      font-size: 28px;
      color: #c9a87c;
      line-height: 0;
      vertical-align: -10px;
      margin-left: 4px;
    }

    .back-link {
      display: inline-block;
      margin-top: 32px;
      font-size: 13px;
      color: #c9a87c;
      text-decoration: none;
      letter-spacing: 0.08em;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📚</div>
    <h1 class="title">趣味：読書</h1>
    <p class="subtitle">Hobby — Reading</p>
    <div class="divider"></div>

    <ul class="info-list">
      <li>
        <span class="label">好きなジャンル</span>
        <span class="value">ミステリー</span>
      </li>
      <li>
        <span class="label">最近読んだ本</span>
        <span class="value">東野圭吾の作品</span>
      </li>
    </ul>

    <p class="message">好きな本のジャンルはミステリーです。最近読んだ本は東野圭吾の作品です。</p>

    <a class="back-link" href="index.html">← 自己紹介に戻る</a>
  </div>
</body>
</html>
